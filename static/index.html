<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#fff5f0">
    <title>Upload Photos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(180deg, #fff5f0 0%, #fde6ec 55%, #f7e1d4 100%);
            color: #333;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            -webkit-text-size-adjust: 100%;
        }

        .decorations {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .flower {
            position: absolute;
            width: 180px;
            height: 180px;
            opacity: 0.78;
            filter: drop-shadow(0 2px 4px rgba(180, 120, 130, 0.12));
        }

        .flower-tl { top: -45px; left: -55px; transform: rotate(-18deg); color: #f6b2c4; }
        .flower-tr { top: -60px; right: -60px; width: 210px; height: 210px; transform: rotate(28deg); color: #f9cbb5; opacity: 0.72; }
        .flower-bl { bottom: -65px; left: -70px; width: 230px; height: 230px; transform: rotate(-32deg); color: #e8c8e0; opacity: 0.68; }
        .flower-br { bottom: -50px; right: -55px; transform: rotate(22deg); color: #d8e5c0; }

        .petal {
            position: absolute;
            width: 70px;
            height: 70px;
            opacity: 0.55;
        }

        .petal-1 { top: 18%; right: 8%; color: #f7c0ce; transform: rotate(15deg); }
        .petal-2 { bottom: 22%; left: 6%; color: #f9d0b7; transform: rotate(-25deg); width: 60px; height: 60px; }

        @media (max-width: 480px) {
            .flower { width: 130px; height: 130px; }
            .flower-tr { width: 150px; height: 150px; top: -40px; right: -45px; }
            .flower-bl { width: 160px; height: 160px; bottom: -50px; left: -55px; }
            .flower-br { width: 140px; height: 140px; }
            .petal { width: 52px; height: 52px; }
            .petal-2 { width: 44px; height: 44px; }
        }

        .container {
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100dvh;
            justify-content: center;
            position: relative;
            z-index: 1;
        }

        .title {
            font-family: "Playfair Display", Georgia, "Times New Roman", serif;
            font-size: 2.2rem;
            font-weight: 600;
            color: #c47b8a;
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }

        .title-ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 1.2rem;
            color: #d4a9b2;
        }

        .title-ornament::before,
        .title-ornament::after {
            content: "";
            display: inline-block;
            width: 40px;
            height: 1px;
            background: currentColor;
            opacity: 0.6;
        }

        /* When uploads are happening, align to top so list can scroll */
        .container.has-uploads {
            justify-content: flex-start;
            padding-top: 3rem;
        }

        .subtitle {
            font-size: 1rem;
            color: #7a5962;
            margin-bottom: 2rem;
            line-height: 1.55;
            font-style: italic;
        }

        .drop-zone {
            border: 2px dashed #e8c4cf;
            border-radius: 16px;
            padding: 3rem 1.5rem;
            transition: border-color 0.2s, background-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            width: 100%;
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 4px 18px rgba(196, 123, 138, 0.08);
        }

        .drop-zone:active {
            background-color: rgba(255, 238, 242, 0.75);
            border-color: #c47b8a;
        }

        .drop-zone.dragover {
            border-color: #c47b8a;
            background-color: rgba(255, 238, 242, 0.75);
        }

        .upload-btn {
            display: inline-block;
            background: #1e754b;
            color: #fff;
            border: none;
            padding: 1.1rem 2.5rem;
            font-size: 1.15rem;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            max-width: 320px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .upload-btn:hover {
            background: #19623f;
        }

        .upload-btn:active {
            background: #145234;
            transform: scale(0.98);
        }

        .hint {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 1rem;
        }

        /* Hide drag-and-drop hint on touch devices */
        @media (hover: none) and (pointer: coarse) {
            .hint {
                display: none;
            }

            .drop-zone {
                padding: 2.5rem 1.5rem;
            }
        }

        .progress-list {
            margin-top: 1.5rem;
            text-align: left;
            width: 100%;
        }

        .progress-item {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(232, 196, 207, 0.5);
            border-radius: 10px;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 2px 8px rgba(196, 123, 138, 0.06);
        }

        .progress-thumb {
            width: 48px;
            height: 48px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
            background: #eee;
        }

        .progress-thumb.hidden {
            display: none;
        }

        .progress-body {
            flex: 1;
            min-width: 0;
        }

        .progress-item .filename {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 0.5rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .progress-bar-container {
            background: #eee;
            border-radius: 3px;
            height: 6px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #4A90A4;
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-bar.complete {
            background: #5cb85c;
        }

        .progress-bar.error {
            background: #d9534f;
        }

        .progress-status {
            font-size: 0.75rem;
            color: #888;
            margin-top: 0.35rem;
        }

        .progress-status.complete {
            color: #5cb85c;
        }

        .progress-status.error {
            color: #d9534f;
        }

        .summary {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #5cb85c;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="decorations" aria-hidden="true">
        <svg class="flower flower-tl" viewBox="0 0 200 200">
            <g transform="translate(100 100)">
                <g>
                    <ellipse cx="0" cy="-55" rx="24" ry="48" fill="currentColor"/>
                    <ellipse cx="0" cy="-55" rx="24" ry="48" fill="currentColor" transform="rotate(60)"/>
                    <ellipse cx="0" cy="-55" rx="24" ry="48" fill="currentColor" transform="rotate(120)"/>
                    <ellipse cx="0" cy="-55" rx="24" ry="48" fill="currentColor" transform="rotate(180)"/>
                    <ellipse cx="0" cy="-55" rx="24" ry="48" fill="currentColor" transform="rotate(240)"/>
                    <ellipse cx="0" cy="-55" rx="24" ry="48" fill="currentColor" transform="rotate(300)"/>
                </g>
                <circle r="22" fill="#f4c27d"/>
                <circle r="12" fill="#e09b4a"/>
            </g>
        </svg>
        <svg class="flower flower-tr" viewBox="0 0 200 200">
            <g transform="translate(100 100)">
                <g>
                    <ellipse cx="0" cy="-60" rx="20" ry="50" fill="currentColor"/>
                    <ellipse cx="0" cy="-60" rx="20" ry="50" fill="currentColor" transform="rotate(45)"/>
                    <ellipse cx="0" cy="-60" rx="20" ry="50" fill="currentColor" transform="rotate(90)"/>
                    <ellipse cx="0" cy="-60" rx="20" ry="50" fill="currentColor" transform="rotate(135)"/>
                    <ellipse cx="0" cy="-60" rx="20" ry="50" fill="currentColor" transform="rotate(180)"/>
                    <ellipse cx="0" cy="-60" rx="20" ry="50" fill="currentColor" transform="rotate(225)"/>
                    <ellipse cx="0" cy="-60" rx="20" ry="50" fill="currentColor" transform="rotate(270)"/>
                    <ellipse cx="0" cy="-60" rx="20" ry="50" fill="currentColor" transform="rotate(315)"/>
                </g>
                <circle r="24" fill="#f7d89a"/>
                <circle r="14" fill="#e6a555"/>
            </g>
        </svg>
        <svg class="flower flower-bl" viewBox="0 0 200 200">
            <g transform="translate(100 100)">
                <circle cx="0" cy="-45" r="30" fill="currentColor"/>
                <circle cx="40" cy="-15" r="30" fill="currentColor"/>
                <circle cx="25" cy="38" r="30" fill="currentColor"/>
                <circle cx="-25" cy="38" r="30" fill="currentColor"/>
                <circle cx="-40" cy="-15" r="30" fill="currentColor"/>
                <circle r="20" fill="#f0d2e6"/>
                <circle r="10" fill="#c88cb5"/>
            </g>
        </svg>
        <svg class="flower flower-br" viewBox="0 0 200 200">
            <g transform="translate(100 100)">
                <path d="M 0 -70 Q 35 -35 0 0 Q -35 -35 0 -70 Z" fill="currentColor"/>
                <path d="M 0 -70 Q 35 -35 0 0 Q -35 -35 0 -70 Z" fill="currentColor" transform="rotate(72)"/>
                <path d="M 0 -70 Q 35 -35 0 0 Q -35 -35 0 -70 Z" fill="currentColor" transform="rotate(144)"/>
                <path d="M 0 -70 Q 35 -35 0 0 Q -35 -35 0 -70 Z" fill="currentColor" transform="rotate(216)"/>
                <path d="M 0 -70 Q 35 -35 0 0 Q -35 -35 0 -70 Z" fill="currentColor" transform="rotate(288)"/>
                <circle r="18" fill="#f8e3a0"/>
            </g>
        </svg>
        <svg class="petal petal-1" viewBox="0 0 200 200">
            <g transform="translate(100 100)">
                <ellipse cx="0" cy="-50" rx="18" ry="42" fill="currentColor"/>
                <ellipse cx="0" cy="-50" rx="18" ry="42" fill="currentColor" transform="rotate(72)"/>
                <ellipse cx="0" cy="-50" rx="18" ry="42" fill="currentColor" transform="rotate(144)"/>
                <ellipse cx="0" cy="-50" rx="18" ry="42" fill="currentColor" transform="rotate(216)"/>
                <ellipse cx="0" cy="-50" rx="18" ry="42" fill="currentColor" transform="rotate(288)"/>
                <circle r="16" fill="#f3c48b"/>
            </g>
        </svg>
        <svg class="petal petal-2" viewBox="0 0 200 200">
            <g transform="translate(100 100)">
                <ellipse cx="0" cy="-50" rx="18" ry="42" fill="currentColor"/>
                <ellipse cx="0" cy="-50" rx="18" ry="42" fill="currentColor" transform="rotate(72)"/>
                <ellipse cx="0" cy="-50" rx="18" ry="42" fill="currentColor" transform="rotate(144)"/>
                <ellipse cx="0" cy="-50" rx="18" ry="42" fill="currentColor" transform="rotate(216)"/>
                <ellipse cx="0" cy="-50" rx="18" ry="42" fill="currentColor" transform="rotate(288)"/>
                <circle r="16" fill="#f3c48b"/>
            </g>
        </svg>
    </div>
    <div class="container" id="container">
        <h1 class="title">Bravo, vous avez réussi le jeu !</h1>
        <div class="title-ornament"></div>
        <p class="subtitle">Ajoutez vos plus belles photos en appuyant sur le bouton ci-dessous</p>

        <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" multiple accept="image/*" hidden>
            <button class="upload-btn" id="uploadBtn">Choisir des photos</button>
            <p class="hint">ou glissez-d&eacute;posez ici</p>
        </div>

        <div class="progress-list" id="progressList"></div>
        <div class="summary" id="summary"></div>
    </div>

    <script>
        const container = document.getElementById('container');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressList = document.getElementById('progressList');
        const summary = document.getElementById('summary');

        uploadBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });

        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                uploadFiles(fileInput.files);
                fileInput.value = '';
            }
        });

        // Drag and drop (desktop only, gracefully ignored on mobile)
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                uploadFiles(files);
            }
        });

        let totalFiles = 0;
        let completedFiles = 0;

        function uploadFiles(files) {
            summary.textContent = '';
            totalFiles += files.length;
            container.classList.add('has-uploads');
            for (const file of files) {
                uploadFile(file);
            }
            // Scroll to progress list on mobile
            setTimeout(() => {
                progressList.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }

        function uploadFile(file) {
            const item = document.createElement('div');
            item.className = 'progress-item';
            item.innerHTML = `
                <img class="progress-thumb" alt="">
                <div class="progress-body">
                    <div class="filename">${escapeHtml(file.name)}</div>
                    <div class="progress-bar-container">
                        <div class="progress-bar"></div>
                    </div>
                    <div class="progress-status">0%</div>
                </div>
            `;
            progressList.appendChild(item);

            const thumb = item.querySelector('.progress-thumb');
            const objectUrl = URL.createObjectURL(file);
            thumb.src = objectUrl;
            thumb.addEventListener('load', () => URL.revokeObjectURL(objectUrl));
            thumb.addEventListener('error', () => {
                URL.revokeObjectURL(objectUrl);
                thumb.classList.add('hidden');
            });

            const bar = item.querySelector('.progress-bar');
            const status = item.querySelector('.progress-status');

            const xhr = new XMLHttpRequest();
            const formData = new FormData();
            formData.append('photo', file);

            xhr.upload.addEventListener('progress', (e) => {
                if (e.lengthComputable) {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    bar.style.width = pct + '%';
                    status.textContent = pct + '%';
                }
            });

            xhr.addEventListener('load', () => {
                completedFiles++;
                if (xhr.status === 200) {
                    bar.style.width = '100%';
                    bar.classList.add('complete');
                    status.textContent = 'Termin\u00e9';
                    status.classList.add('complete');
                } else {
                    bar.classList.add('error');
                    status.textContent = 'Erreur: ' + xhr.statusText;
                    status.classList.add('error');
                }
                checkAllDone();
            });

            xhr.addEventListener('error', () => {
                completedFiles++;
                bar.classList.add('error');
                status.textContent = 'Erreur r\u00e9seau';
                status.classList.add('error');
                checkAllDone();
            });

            xhr.open('POST', '/upload');
            xhr.send(formData);
        }

        function checkAllDone() {
            if (completedFiles === totalFiles) {
                summary.textContent = totalFiles + ' photo' + (totalFiles > 1 ? 's' : '') + ' envoy\u00e9e' + (totalFiles > 1 ? 's' : '');
                summary.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
