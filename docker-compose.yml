services:
  photo-upload:
    container_name: photo-upload
    build: .
    expose:
      - "8080"
    volumes:
      - /srv/NAS/anniversaire:/uploads
    environment:
      - UPLOAD_DIR=/uploads
      - MAX_FILE_SIZE=300
    restart: unless-stopped
    labels:
      - "traefik.http.routers.photo-upload.rule=Host(`anniversaire.valgrind.cloud`)"
      - "traefik.http.routers.photo-upload.entrypoints=websecure"
      - "traefik.http.services.photo-upload.loadbalancer.server.port=8080"
      - "traefik.http.routers.photo-upload.tls=true"
    networks:
      nginx:
        ipv4_address: $ANNIVERSAIRE_IP
networks:
  nginx:
    external: true
    name: $NETWORK_NAME
